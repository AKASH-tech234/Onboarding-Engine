<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive Result Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400..800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --color-base: #0a0f1e;
      --color-surface: rgba(255, 255, 255, 0.03);
      --color-border: rgba(255, 255, 255, 0.08);
      --color-text-primary: #f8fafc;
      --color-text-secondary: #94a3b8;
      --color-accent-blue: #4f8ef7;
      --color-accent-red: #ef4444;
      --color-accent-red-glow: rgba(239, 68, 68, 0.25);
      --color-accent-amber: #f59e0b;
      --color-accent-green: #10b981;
      
      --font-heading: 'Syne', sans-serif;
      --font-number: 'DM Mono', monospace;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-base);
      color: var(--color-text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated Gradient Mesh Background */
    .bg-mesh {
      position: absolute;
      inset: -50%;
      z-index: 0;
      background: 
        radial-gradient(circle at 50% 20%, rgba(79, 142, 247, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(239, 68, 68, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
      animation: rotate 8s infinite linear;
      pointer-events: none;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .banner-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1200px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    @media (min-width: 1024px) {
      .banner-card {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    /* Staggered Reveal Initial States */
    .reveal-item {
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .reveal-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .content-area {
      flex: 1;
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--color-text-secondary);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .heading {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    @media (min-width: 768px) {
      .heading { font-size: 2.75rem; }
    }

    .arrow {
      color: var(--color-accent-blue);
      animation: pulse-glow 2s infinite ease-in-out;
      display: inline-block;
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 8px rgba(79, 142, 247, 0.3); opacity: 0.8; }
      50% { text-shadow: 0 0 15px rgba(79, 142, 247, 0.8); opacity: 1; }
    }

    .subtext {
      color: var(--color-text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 600px;
    }

    .action-area {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.5rem;
    }

    @media (min-width: 1024px) {
      .action-area {
        align-items: flex-end;
      }
    }

    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--color-border);
      border-radius: 99px;
      padding: 0.6rem 1.25rem 0.6rem 0.75rem;
      position: relative;
      overflow: hidden;
      min-width: 140px;
    }

    .stat-chip::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--chip-color, var(--color-border));
    }

    .stat-chip.total { --chip-color: var(--color-accent-amber); }
    .stat-chip.critical { 
      --chip-color: var(--color-accent-red); 
      box-shadow: 0 0 20px var(--color-accent-red-glow);
      border-color: rgba(239, 68, 68, 0.2);
    }
    .stat-chip.hours { --chip-color: var(--color-accent-green); }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-secondary);
      margin-left: 0.25rem;
    }

    .stat-value {
      font-family: var(--font-number);
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .btn-back {
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-primary);
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 99px;
      border: 1px solid var(--color-border);
      background: transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
      transition: color 0.3s;
      cursor: pointer;
    }

    .btn-back::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0%;
      height: 100%;
      background: var(--color-text-primary);
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: -1;
    }

    .btn-back:hover {
      color: var(--color-base);
    }
    
    .btn-back:hover::before {
      width: 100%;
    }

  </style>
</head>
<body>

  <div class="bg-mesh"></div>

  <div class="banner-card">
    <div class="content-area">
      <div class="label reveal-item">Adaptive Result</div>
      <h1 class="heading reveal-item">
        <span>Ayush Tiwari</span>
        <span class="arrow">→</span>
        <span>Backend Developer</span>
      </h1>
      <p class="subtext reveal-item">
        Review the skill gap summary, explore the dependency graph, and inspect the reasoning trace for each recommendation.
      </p>
    </div>

    <div class="action-area">
      <div class="stats-row reveal-item">
        <div class="stat-chip total">
          <div class="stat-label">TOTAL GAPS</div>
          <div class="stat-value" data-target="18">0</div>
        </div>
        <div class="stat-chip critical">
          <div class="stat-label">CRITICAL GAPS</div>
          <div class="stat-value" data-target="10">0</div>
        </div>
        <div class="stat-chip hours">
          <div class="stat-label">TRAINING HOURS</div>
          <div class="stat-value" data-target="49">0</div>
        </div>
      </div>
      <a href="#" class="btn-back reveal-item">
        <span>←</span> Back
      </a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const items = document.querySelectorAll('.reveal-item');
      items.forEach((item, index) => {
        setTimeout(() => {
          item.classList.add('visible');
        }, 50 * index + 100);
      });

      const easeOutQuad = t => t * (2 - t);
      const counters = document.querySelectorAll('.stat-value');
      const duration = 800; // 800ms
      
      counters.forEach(counter => {
        const target = parseInt(counter.getAttribute('data-target'), 10);
        let startTime = null;

        const step = (currentTime) => {
          if (!startTime) startTime = currentTime;
          const progress = Math.min((currentTime - startTime) / duration, 1);
          const currentVal = Math.floor(easeOutQuad(progress) * target);
          counter.textContent = currentVal;
          if (progress < 1) {
            window.requestAnimationFrame(step);
          } else {
            counter.textContent = target;
          }
        };
        
        setTimeout(() => {
          window.requestAnimationFrame(step);
        }, 400); 
      });
    });
  </script>
</body>
</html>
